name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/inventory-ms
            git pull origin main
            ENV_FILE=~/inventory-ms/.env
            touch "$ENV_FILE"

            upsert_env() {
              KEY="$1"
              VALUE="$2"
              if grep -q "^${KEY}=" "$ENV_FILE"; then
                sed -i "s|^${KEY}=.*|${KEY}=${VALUE}|" "$ENV_FILE"
              else
                echo "${KEY}=${VALUE}" >> "$ENV_FILE"
              fi
            }

            upsert_env AWS_ACCESS_KEY_ID '${{ secrets.AWS_ACCESS_KEY_ID }}'
            upsert_env AWS_SECRET_ACCESS_KEY '${{ secrets.AWS_SECRET_ACCESS_KEY }}'
            upsert_env AWS_REGION 'ap-south-1'
            upsert_env S3_UPLOADS_BUCKET '${{ secrets.S3_BUCKET }}'
            cd backend
            npm install --production
            pm2 restart backend
            pm2 status
